name: Kubernetes Upgrade

on:
  push:
    branches: [stage]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  check-k8s-version:
    name: Check latest Kubernetes version
    runs-on: [self-hosted-arm]
    container:
      image: ghcr.io/dubovsky-andrey/k8s-ubuntu:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Kubernetes stable release
        id: fetch_k8s
        run: |
          chmod +x scripts/ci/check_kubernetes_stable_version.sh
          bash scripts/ci/check_kubernetes_stable_version.sh

      - name: Write version summary
        if: always()
        run: |
          echo "### Kubernetes version report" >> $GITHUB_STEP_SUMMARY
          echo "- Latest stable release: ${{ steps.fetch_k8s.outputs.k8s_latest }}" >> $GITHUB_STEP_SUMMARY

  check-upgrade:
    name: Check Upgrade
    runs-on: [self-hosted-arm]
    container:
      image: ghcr.io/dubovsky-andrey/k8s-ubuntu:latest
    needs:
      - check-k8s-version
    outputs:
      desired: ${{ steps.config.outputs.desired }}
      node_list: ${{ steps.list-names.outputs.node_list }}
      need_upgrade: ${{ steps.check.outputs.need_upgrade }}
      nodes_checked: ${{ steps.list.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install yq for YAML parsing
          chmod +x scripts/ci/install_yr.sh
          bash scripts/ci/install_yr.sh

      - name: Get desired version and label selector
        id: config
        run: |
          chmod +x scripts/ci/desire_kubernetes_version.sh
          scripts/ci/desire_kubernetes_version.sh

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ steps.config.outputs.desired }}

      - name: Decode kubeconfig
        shell: bash
        env:
          ADMIN_KUBECONFIG_B64: ${{ secrets.ADMIN_KUBECONFIG_B64 }}
        run: |
          chmod +x scripts/ci/decode_kube_config.sh
          scripts/ci/decode_kube_config.sh

      - id: list
        name: Get list of nodes
        env:
          SEL: ${{ steps.config.outputs.selector }}
        run: |
          chmod +x scripts/ci/get_list_of_nodes.sh
          scripts/ci/get_list_of_nodes.sh

      - id: list-names
        name: Collecting node names into a string
        run: |
          NODE_LIST=$(paste -sd' ' /tmp/nodes.lst)
          echo "→ Nodes: $NODE_LIST"
          echo "node_list=$NODE_LIST" >> $GITHUB_OUTPUT

      - id: check
        name: Compare kubelet versions
        env:
          DESIRED: ${{ steps.config.outputs.desired }}
        run: |
          chmod +x scripts/ci/compare_kubelet_versions.sh
          scripts/ci/compare_kubelet_versions.sh

      - name: Write summary
        if: always()
        env:
          DESIRED: ${{ steps.config.outputs.desired }}
          NODES_NEED_UPGRADE: ${{ steps.check.outputs.need_upgrade }}
          NODES_LIST_COUNT: ${{ steps.list.outputs.count }}
        run: |
          chmod +x scripts/ci/check_update_summary.sh
          scripts/ci/check_update_summary.sh

  backup-etcd:
    name: Backup etcd Snapshot
    needs:
      - check-upgrade
      - check-k8s-version
    runs-on: [self-hosted-arm]
    container:
      image: ghcr.io/dubovsky-andrey/k8s-ubuntu:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install yq for YAML parsing
          chmod +x scripts/ci/install_yr.sh
          bash scripts/ci/install_yr.sh

          # Install kubectl
          chmod +x scripts/ci/install_kubctl.sh
          bash scripts/ci/install_kubctl.sh

      - name: Decode kubeconfig
        shell: bash
        env:
          ADMIN_KUBECONFIG_B64: ${{ secrets.ADMIN_KUBECONFIG_B64 }}
        run: |
          chmod +x scripts/ci/decode_kube_config.sh
          scripts/ci/decode_kube_config.sh

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          chmod +x scripts/ci/setup_ssh_key.sh
          scripts/ci/setup_ssh_key.sh

      - name: Sync etcdctl version from control-plane
        shell: bash
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          chmod +x scripts/ci/sync_etcdctl_version.sh
          scripts/ci/sync_etcdctl_version.sh

