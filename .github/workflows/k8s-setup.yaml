name: Kubernetes Setup

on:
  push:
    branches: [setup]
  pull_request:

permissions:
  contents: read

jobs:
  check-k8s-version:
    name: Check node availability
    runs-on: [self-hosted-arm]
    container:
      image: ghcr.io/dubovsky-andrey/k8s-ubuntu:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check ICMP (ping) to k8s-node-4
        run: |
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -H k8s-node-4 >> "$HOME/.ssh/known_hosts"
          chmod 700 "$HOME/.ssh"
          chmod 644 "$HOME/.ssh/known_hosts"
          echo "$HOME/.ssh/known_hosts:"
          cat "$HOME/.ssh/known_hosts"

      - name: Run Ansible Playbook (deploy SSH key + disable password login)
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook \
            -i ansible/inventory.ini \
            -u ${{ secrets.SSH_USER }} \
            ansible/playbooks/setup-ssh.yml \
            --extra-vars "\
            ansible_ssh_pass=${{ secrets.SSH_PASS }} \
            ansible_become_pass=${{ secrets.SSH_PASS }} \
            ssh_pub_key='${{ secrets.SSH_SETUP_PUB_KEY }}' \
            target_user=${{ secrets.SSH_USER }} \
            "
      - name: Run Ansible Playbook k8s setup
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            -u ${{ secrets.SSH_USER }} \
            ansible/playbooks/setup-k8s-general.yml \
            --extra-vars "\
            ansible_ssh_pass=${{ secrets.SSH_PASS }} \
            ansible_become_pass=${{ secrets.SSH_PASS }} \
            ssh_pub_key='${{ secrets.SSH_SETUP_PUB_KEY }}' \
            "
