- name: Update repositories cache and upgrade system on Debian/Ubuntu/Raspbian
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
    autoclean: true
    autoremove: true
  when: ansible_facts.os_family == "Debian"

- name: Ensure python3-libdnf5 is installed
  ansible.builtin.raw: dnf install -y python3-libdnf5
  become: true
  when: ansible_facts.os_family == "RedHat"
  changed_when: false

- name: Update repositories cache and upgrade system on RHEL/CentOS/Fedora
  ansible.builtin.dnf:
    name: "*"
    update_cache: true
    update_only: true
    autoremove: true
  when: ansible_facts.os_family == "RedHat"

- name: Check if a reboot is needed
  register: reboot_required_file
  ansible.builtin.stat:
    path: /var/run/reboot-required

- name: Reboot if needed
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible for kernel updates"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  when: reboot_required_file.stat.exists
