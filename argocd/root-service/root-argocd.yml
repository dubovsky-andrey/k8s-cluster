apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-root-service
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: https://github.com/dubovsky-andrey/k8s-cluster.git

    path: argocd/apps
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
