apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-root-service
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: https://github.com/dubovsky-andrey/k8s-cluster.git
    path: apps
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
